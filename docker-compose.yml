services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teacher_replacement}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-dev}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-teacher_replacement}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000,http://127.0.0.1:8001,http://localhost:8001}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000,http://127.0.0.1:8001,http://localhost:8001}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MAX_CHAT_ATTACHMENT_SIZE: ${MAX_CHAT_ATTACHMENT_SIZE:-5242880}
      CHAT_THREAD_LIMIT: ${CHAT_THREAD_LIMIT:-200}
      MAX_DOCX_UPLOAD_SIZE: ${MAX_DOCX_UPLOAD_SIZE:-10485760}
      MAX_SCHEDULE_UPLOAD_SIZE: ${MAX_SCHEDULE_UPLOAD_SIZE:-10485760}
    ports:
      - "${APP_PORT:-8001}:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  celery_worker:
    build:
      context: .
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-dev}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-teacher_replacement}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "celery -A teacher_replacement worker -l info"

volumes:
  postgres_data:
  media_data:
  static_data:
  redis_data:
