{% extends "base.html" %}

{% block title %}Регистрация школы{% endblock %}
{% block body_class %}auth{% endblock %}
{% block header %}{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="card__body">
        <h1 class="card__title">Заявка на регистрацию школы</h1>
        <form method="post" class="stack">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn--primary" type="submit">Отправить заявку</button>
          <a class="btn btn--ghost" href="{% url 'accounts:entry' %}">Назад</a>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
